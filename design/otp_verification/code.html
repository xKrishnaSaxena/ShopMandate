<script>
        // Simple script to handle OTP input focus flow
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('otp-container');
            const inputs = container.querySelectorAll('input');

            inputs.forEach((input, index) => {
                // Focus styling handler
                input.addEventListener('focus', () => {
                    input.classList.remove('border-outline-variant');
                    input.classList.add('border-primary', 'shadow-[0_4px_12px_rgb(54,0,205,0.08)]');
                });

                input.addEventListener('blur', () => {
                    if (input.value === '') {
                        input.classList.add('border-outline-variant');
                        input.classList.remove('border-primary', 'shadow-[0_4px_12px_rgb(54,0,205,0.08)]');
                    }
                });

                // Auto-advance
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    if (e.target.value !== '' && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                // Handle backspace
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        });
    </script>
