<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Shopping Assistant - Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#563bed",
                        "on-primary-fixed": "#160066",
                        "surface-container-high": "#ede4fc",
                        "primary-fixed-dim": "#c6bfff",
                        "on-surface-variant": "#474556",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e7dff6",
                        "primary-container": "#4f32e7",
                        "outline": "#787587",
                        "primary-fixed": "#e4dfff",
                        "secondary-container": "#fe693c",
                        "tertiary": "#004b2f",
                        "background": "#fdf7ff",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fdf7ff",
                        "inverse-surface": "#322e3f",
                        "on-tertiary-fixed": "#002112",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f5eeff",
                        "surface-container-low": "#f8f1ff",
                        "on-primary-fixed-variant": "#3d10d7",
                        "inverse-primary": "#c6bfff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#cfc8ff",
                        "on-tertiary-container": "#60e6a6",
                        "surface-container": "#f3eaff",
                        "tertiary-container": "#006541",
                        "on-secondary-fixed-variant": "#862200",
                        "on-primary": "#ffffff",
                        "surface": "#fdf7ff",
                        "on-surface": "#1d1929",
                        "tertiary-fixed": "#76fbb9",
                        "on-secondary-container": "#601600",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1d1929",
                        "secondary-fixed-dim": "#ffb59f",
                        "on-secondary-fixed": "#3b0a00",
                        "surface-variant": "#e7dff6",
                        "outline-variant": "#c8c4d9",
                        "on-error-container": "#93000a",
                        "secondary": "#ae3104",
                        "secondary-fixed": "#ffdbd1",
                        "on-tertiary-fixed-variant": "#005234",
                        "surface-dim": "#dfd6ed",
                        "tertiary-fixed-dim": "#57de9f",
                        "primary": "#3600cd",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "stack-md": "24px",
                        "gutter": "16px",
                        "stack-lg": "40px",
                        "stack-sm": "12px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Top Navigation (from JSON) -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background px-container-padding py-stack-sm flex justify-between items-center transition-transform duration-200">
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">ShopMandate</span>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-md px-container-padding pt-24 pb-32 z-10 relative">
<!-- Greeting & Headline -->
<div class="text-center mb-stack-lg animate-fade-in-up">
<p class="font-body-md text-body-md text-on-surface-variant mb-2">Namaste 👋</p>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background">Kya chahiye aaj?</h1>
</div>
<!-- Center Interactive Area -->
<div class="flex flex-col items-center justify-center w-full max-w-xs mx-auto mb-stack-lg gap-8 relative z-20">
<!-- Primary Action: Mic Button -->
<div class="relative group cursor-pointer flex flex-col items-center">
<!-- Pulse rings -->
<div class="absolute inset-0 rounded-full bg-gradient-to-r from-primary-container to-secondary-container opacity-30 pulse-ring"></div>
<div class="absolute inset-0 rounded-full bg-gradient-to-r from-primary-container to-secondary-container opacity-20 pulse-ring" style="animation-delay: 1s;"></div>
<!-- Main Button Surface -->
<button class="relative w-32 h-32 rounded-full bg-gradient-to-br from-primary-container to-secondary-container text-on-primary shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-all duration-300 z-10">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<span class="mt-4 font-label-md text-label-md text-primary">Bolke batao</span>
</div>
<!-- Secondary Action: Camera -->
<button class="flex items-center gap-2 px-6 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant hover:bg-surface-container-low hover:border-primary-container hover:text-primary-container transition-all duration-200">
<span class="material-symbols-outlined">photo_camera</span>
<span class="font-label-md text-label-md">Ya photo dikhao</span>
</button>
</div>
<!-- Suggestion Chips -->
<div class="w-full flex flex-col items-center gap-4 mb-stack-lg">
<div class="flex flex-wrap justify-center gap-2">
<button class="px-4 py-2 rounded-full bg-surface-container text-on-surface-variant font-caption text-caption hover:bg-primary-container hover:text-on-primary-container transition-colors">Wireless earbuds</button>
<button class="px-4 py-2 rounded-full bg-surface-container text-on-surface-variant font-caption text-caption hover:bg-primary-container hover:text-on-primary-container transition-colors">Atta 5kg</button>
<button class="px-4 py-2 rounded-full bg-surface-container text-on-surface-variant font-caption text-caption hover:bg-primary-container hover:text-on-primary-container transition-colors">Phone charger</button>
</div>
</div>
<!-- Text Input Fallback -->
<div class="w-full max-w-sm relative mt-auto">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full pl-12 pr-4 py-3 rounded-full bg-surface-container-lowest border border-outline-variant text-on-background font-body-md text-body-md placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent shadow-sm transition-all" placeholder="...ya type karo" type="text"/>
</div>
</main>
<!-- Bottom Navigation (from JSON) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-8 pt-4 shadow-[0_-8px_30px_rgb(79,50,231,0.08)] bg-surface-container-lowest dark:bg-inverse-surface rounded-t-xl md:hidden">
<!-- Active Tab: Home -->
<button class="flex items-center justify-center bg-secondary-container text-on-secondary-container rounded-full p-4 scale-110 -translate-y-4 shadow-[0_10px_25px_rgb(254,105,60,0.3)] transition-all">
<span class="material-symbols-outlined font-headline-md text-headline-md font-bold" style="font-variation-settings: 'FILL' 1;">home</span>
</button>
<!-- Inactive Tabs -->
<button class="flex items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined font-label-md text-label-md">search</span>
</button>
<button class="flex items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined font-label-md text-label-md">mic</span>
</button>
<button class="flex items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined font-label-md text-label-md">shopping_bag</span>
</button>
<button class="flex items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined font-label-md text-label-md">person</span>
</button>
</nav>
<!-- Ambient Background Elements -->
<div aria-hidden="true" class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-40 -left-40 w-96 h-96 bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
<div class="absolute top-40 -right-40 w-96 h-96 bg-secondary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob" style="animation-delay: 2s;"></div>
<div class="absolute -bottom-40 left-20 w-96 h-96 bg-tertiary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob" style="animation-delay: 4s;"></div>
</div>
<style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.6s ease-out forwards;
        }
    </style>
</body></html>
