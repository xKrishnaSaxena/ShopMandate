<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Listening - ShopMandate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#563bed",
                        "on-primary-fixed": "#160066",
                        "surface-container-high": "#ede4fc",
                        "primary-fixed-dim": "#c6bfff",
                        "on-surface-variant": "#474556",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e7dff6",
                        "primary-container": "#4f32e7",
                        "outline": "#787587",
                        "primary-fixed": "#e4dfff",
                        "secondary-container": "#fe693c",
                        "tertiary": "#004b2f",
                        "background": "#fdf7ff",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fdf7ff",
                        "inverse-surface": "#322e3f",
                        "on-tertiary-fixed": "#002112",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f5eeff",
                        "surface-container-low": "#f8f1ff",
                        "on-primary-fixed-variant": "#3d10d7",
                        "inverse-primary": "#c6bfff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#cfc8ff",
                        "on-tertiary-container": "#60e6a6",
                        "surface-container": "#f3eaff",
                        "tertiary-container": "#006541",
                        "on-secondary-fixed-variant": "#862200",
                        "on-primary": "#ffffff",
                        "surface": "#fdf7ff",
                        "on-surface": "#1d1929",
                        "tertiary-fixed": "#76fbb9",
                        "on-secondary-container": "#601600",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1d1929",
                        "secondary-fixed-dim": "#ffb59f",
                        "on-secondary-fixed": "#3b0a00",
                        "surface-variant": "#e7dff6",
                        "outline-variant": "#c8c4d9",
                        "on-error-container": "#93000a",
                        "secondary": "#ae3104",
                        "secondary-fixed": "#ffdbd1",
                        "on-tertiary-fixed-variant": "#005234",
                        "surface-dim": "#dfd6ed",
                        "tertiary-fixed-dim": "#57de9f",
                        "primary": "#3600cd",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "stack-md": "24px",
                        "gutter": "16px",
                        "stack-lg": "40px",
                        "stack-sm": "12px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .waveform-bar {
            animation: pulse 1s ease-in-out infinite alternate;
        }
        .waveform-bar:nth-child(1) { animation-delay: 0.1s; }
        .waveform-bar:nth-child(2) { animation-delay: 0.3s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.5s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes pulse {
            0% { transform: scaleY(0.3); opacity: 0.7; }
            100% { transform: scaleY(1.2); opacity: 1; }
        }
        
        .pulse-ring {
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #160066 0%, #3d10d7 100%);
        }
    </style>
</head>
<body class="h-screen w-full overflow-hidden text-on-primary font-body-md gradient-bg flex flex-col justify-between">
<!-- Top Section: Status Label -->
<header class="w-full flex justify-center pt-stack-lg px-container-padding opacity-0 translate-y-4 animate-[fadeIn_0.5s_ease-out_forwards]">
<div class="flex items-center gap-2 bg-primary/20 backdrop-blur-md rounded-full px-4 py-2 border border-primary-fixed/20 shadow-lg shadow-primary-container/10">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary-container opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-secondary-container"></span>
</span>
<span class="font-label-md text-label-md text-primary-fixed">Sun raha hoon...</span>
</div>
</header>
<!-- Middle Section: Live Transcription & Waveform -->
<main class="flex-1 flex flex-col items-center justify-center px-container-padding gap-stack-lg z-10">
<!-- Reactive Waveform Simulation -->
<div class="h-32 flex items-center justify-center gap-2 mb-stack-md w-full max-w-sm">
<div class="w-2 h-12 bg-secondary-container rounded-full waveform-bar"></div>
<div class="w-2 h-20 bg-secondary-fixed-dim rounded-full waveform-bar shadow-[0_0_15px_rgba(254,105,60,0.5)]"></div>
<div class="w-2 h-28 bg-surface-tint rounded-full waveform-bar shadow-[0_0_20px_rgba(86,59,237,0.6)]"></div>
<div class="w-2 h-16 bg-secondary-fixed-dim rounded-full waveform-bar shadow-[0_0_15px_rgba(254,105,60,0.5)]"></div>
<div class="w-2 h-10 bg-secondary-container rounded-full waveform-bar"></div>
</div>
<!-- Live Transcription Text -->
<div class="w-full max-w-md text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-primary">
                "mujhe ₹2000 ke andar acche <span class="text-primary-fixed">wireless earbuds</span> chahiye<span class="animate-pulse">_</span>"
            </h1>
</div>
</main>
<!-- Bottom Section: Controls -->
<footer class="w-full flex flex-col items-center pb-12 px-container-padding gap-stack-md z-20">
<!-- Large Stop Button -->
<div class="relative">
<!-- Pulsing background rings -->
<div class="absolute inset-0 rounded-full bg-secondary-container/20 pulse-ring"></div>
<div class="absolute inset-0 rounded-full bg-secondary-container/40 pulse-ring" style="animation-delay: 0.5s;"></div>
<button class="relative w-20 h-20 bg-secondary-container rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(254,105,60,0.4)] hover:scale-95 transition-transform duration-200 group">
<span class="material-symbols-outlined text-4xl text-on-secondary-container group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">
                    stop
                </span>
</button>
</div>
<!-- Cancel Action -->
<button class="font-label-md text-label-md text-primary-fixed-dim hover:text-primary-fixed transition-colors opacity-80 hover:opacity-100">
            Tap to cancel
        </button>
</footer>
<!-- Background Ambient Glows -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-container/30 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[30rem] h-[30rem] bg-secondary-container/10 rounded-full blur-[120px]"></div>
</div>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body></html>
