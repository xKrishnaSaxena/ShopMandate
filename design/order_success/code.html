<script>
        // Collapsible Logic
        const toggleBtn = document.getElementById('receipt-toggle');
        const content = document.getElementById('receipt-content');
        const chevron = document.getElementById('chevron');

        toggleBtn.addEventListener('click', () => {
            content.classList.toggle('hidden');
            content.classList.toggle('flex');
            
            if (content.classList.contains('flex')) {
                chevron.style.transform = 'rotate(180deg)';
                // Small animation when opening
                content.style.opacity = '0';
                content.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    content.style.transition = 'all 0.3s ease';
                    content.style.opacity = '1';
                    content.style.transform = 'translateY(0)';
                }, 10);
            } else {
                chevron.style.transform = 'rotate(0deg)';
                content.style.transition = 'none';
            }
        });

        // Lightweight Confetti Effect on Load
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#fe693c', '#4f32e7', '#006541', '#e4dfff'];
            
            for (let i = 0; i < 30; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                
                // Randomize properties
                const size = Math.random() * 8 + 4 + 'px';
                conf.style.width = size;
                conf.style.height = size;
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                
                // Random border radius for mixed shapes
                if (Math.random() > 0.5) {
                    conf.style.borderRadius = '50%';
                }
                
                container.appendChild(conf);
                
                // Animate
                const duration = Math.random() * 2 + 2;
                const delay = Math.random() * 1;
                
                conf.animate([
                    { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate3d(${Math.random()*100 - 50}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });
            }
        });
    </script>
